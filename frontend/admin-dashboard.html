<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super-Administration | Harmonie & Retrouvailles</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fbf9f1',
                            100: '#f5f0db',
                            200: '#eadcb3',
                            300: '#dec282',
                            400: '#d2a353',
                            500: '#c7882c',
                            600: '#b06b22',
                            700: '#924f1e',
                            800: '#78401d',
                            900: '#623519',
                        },
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Dragula (Drag & Drop) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.3/dragula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.3/dragula.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth Scrolling & Transitions */
        html { scroll-behavior: smooth; }
        .transition-all-300 { transition: all 0.3s ease; }
        
        /* Sidebar active state */
        .nav-item.active {
            background: linear-gradient(to right, #f5f0db, transparent);
            border-left: 4px solid #c7882c;
            color: #b06b22;
        }
        .dark .nav-item.active {
            background: linear-gradient(to right, rgba(199, 136, 44, 0.2), transparent);
            border-left: 4px solid #c7882c;
            color: #dec282;
        }
        
        /* Glassmorphism for panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        .dark .glass-panel {
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
        
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dragula styling overrides */
        .gu-mirror {
            opacity: 0.8;
            cursor: grabbing;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 antialiased h-screen overflow-hidden flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white dark:bg-gray-800 shadow-xl flex flex-col transition-all-300 z-20">
        <!-- Logo Area -->
        <div class="h-20 flex items-center justify-center border-b border-gray-100 dark:border-gray-700 px-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center text-white font-bold text-xl shadow-md">
                    HR
                </div>
                <div>
                    <h1 class="font-bold text-sm leading-tight text-gray-900 dark:text-white uppercase tracking-wider">Harmonie</h1>
                    <h2 class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-widest">Retrouvailles</h2>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto py-6 flex flex-col gap-2 px-3 no-scrollbar" id="sidebar-nav">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Modules ERP</p>
            
            <a href="#" data-target="dashboard" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="font-medium">Vue d'ensemble</span>
            </a>
            
            <a href="#" data-target="pedagogie" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="graduation-cap" class="w-5 h-5"></i>
                <span class="font-medium">Pédagogie & Palmarès</span>
            </a>
            
            <a href="#" data-target="rh" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="font-medium">RH & Pointages</span>
            </a>
            
            <a href="#" data-target="finance" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span class="font-medium">Finances & Paie</span>
            </a>
            
            <a href="#" data-target="communication" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <span class="font-medium">Communication (SMS)</span>
            </a>
            
            <a href="#" data-target="coffrefort" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors mt-4">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                <span class="font-medium">Coffre-fort</span>
            </a>
        </nav>

        <!-- User Area -->
        <div class="p-4 border-t border-gray-100 dark:border-gray-700">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Admin+General&background=0D8ABC&color=fff" alt="User" class="w-10 h-10 rounded-full shadow-sm">
                    <div>
                        <p class="text-sm font-semibold text-gray-900 dark:text-white" id="admin-name">Super Admin</p>
                        <p class="text-xs text-gold-600 font-medium">Direction</p>
                    </div>
                </div>
            </div>
            <button id="logout-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition-colors text-sm font-medium dark:bg-red-900/20 dark:hover:bg-red-900/40 dark:text-red-400">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                Déconnexion
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50/50 dark:bg-gray-900 relative">
        
        <!-- Header -->
        <header class="h-20 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-8 z-10 sticky top-0">
            <!-- Search & Context -->
            <div class="flex items-center gap-6 w-1/2">
                <div class="relative w-full max-w-md">
                    <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" placeholder="Rechercher un élève, enseignant, facture..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-700 border-none rounded-full text-sm focus:ring-2 focus:ring-gold-400 outline-none transition-all dark:text-white">
                </div>
            </div>

            <!-- Actions & Toggles -->
            <div class="flex items-center gap-5">
                <!-- Institution Switcher -->
                <div class="bg-gray-100 dark:bg-gray-700 rounded-lg p-1 flex text-sm font-medium">
                    <button class="px-3 py-1 rounded-md bg-white shadow-sm text-gray-800 dark:bg-gray-600 dark:text-white transition-all" id="switch-harmonie">C.S. Harmonie</button>
                    <button class="px-3 py-1 rounded-md text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all" id="switch-retrouvailles">G.S. Retrouvailles</button>
                </div>

                <!-- Theme Toggle -->
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                
                <!-- Notifications -->
                <button class="relative p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 transition-colors">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-8" id="main-content">
            <!-- Dynamic content injected here by JS -->
            <div class="flex items-center justify-center h-full">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gold-500"></div>
            </div>
        </div>
        
    </main>

    <script type="module" src="/src/admin.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
