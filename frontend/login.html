<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion | Harmonie-Retrouvailles</title>
    <script type="module" src="/shared.js"></script>
  </head>
  <body class="bg-[#112240]/60 border border-white/5 text-white font-sans antialiased h-screen flex">

    <!-- Left Side: Campus Image (Hidden on mobile) -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-primary-900 overflow-hidden">
      <img src="https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?q=80&w=1500&auto=format&fit=crop" alt="Campus Harmonie" class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay">
      <div class="absolute inset-0 bg-gradient-to-t from-primary-950 via-primary-900/60 to-primary-900/40"></div>
      
      <div class="relative z-10 flex flex-col justify-end p-16 w-full h-full animate-fade-in">
        <div class="mb-8">
          <div class="w-16 h-16 bg-primary-900 border-2 border-gold-500 flex items-center justify-center text-white font-display font-bold text-2xl shadow-lg mb-6">HR</div>
        </div>
        <h2 class="font-display text-4xl font-bold text-white mb-4 leading-tight">Harmonie-Retrouvailles</h2>
        <div class="w-12 h-1 bg-gold-500 mb-6"></div>
      </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="w-full lg:w-1/2 flex flex-col items-center justify-center bg-[#0A192F]/80 backdrop-blur-xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.5)] text-white p-8 sm:p-12 lg:p-24 relative">
      
      <div class="w-full max-w-md animate-fade-up">
        <!-- Mobile Logo -->
        <div class="flex lg:hidden items-center gap-3 mb-10">
          <div class="w-10 h-10 bg-primary-900 border-2 border-gold-500 flex items-center justify-center text-white font-display font-bold text-lg">HR</div>
        </div>

        <div class="mb-10 text-left">
          <h1 class="font-display font-bold text-3xl text-white mb-3">Bienvenue</h1>
          <p class="text-gray-400 font-light">Connectez-vous à votre espace personnel</p>
        </div>

        <form id="login-form" class="space-y-6">
          <div>
            <label for="email" class="block text-xs font-bold text-white uppercase tracking-widest mb-2">Identifiant / Email</label>
            <input type="text" id="email" class="w-full px-4 py-3 bg-[#112240]/60 border border-white/5 border border-white/10 rounded-sm focus:bg-white focus:ring-2 focus:ring-primary-900 focus:border-primary-900 outline-none transition-all placeholder-gray-400" placeholder="prenom.nom@ecole.cd" required>
          </div>
          
          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="block text-xs font-bold text-white uppercase tracking-widest">Mot de passe</label>
              <a href="#" class="text-xs font-semibold text-secondary-600 hover:text-secondary-700 transition-colors">Mot de passe oublié ?</a>
            </div>
            <input type="password" id="password" class="w-full px-4 py-3 bg-[#112240]/60 border border-white/5 border border-white/10 rounded-sm focus:bg-white focus:ring-2 focus:ring-primary-900 focus:border-primary-900 outline-none transition-all placeholder-gray-400" placeholder="••••••••" required>
          </div>
          
          <div class="flex items-center">
            <input id="remember" type="checkbox" class="h-4 w-4 rounded-sm border-gray-300 text-white focus:ring-primary-900">
            <label for="remember" class="ml-2 block text-sm text-gray-300">Se souvenir de moi</label>
          </div>
          
          <button type="submit" class="w-full bg-primary-900 text-white px-4 py-4 rounded-sm font-bold text-sm tracking-wider uppercase hover:bg-primary-800 transition-all shadow-premium border-b-4 border-primary-950 active:translate-y-1 active:border-b-0 mt-4 flex justify-center items-center gap-2">
            Se connecter
          </button>
        </form>

        <div id="login-error" class="hidden mt-6 p-4 bg-secondary-50 text-secondary-700 text-sm border-l-4 border-secondary-600 flex items-start gap-3">
            <svg class="w-5 h-5 flex-shrink-0 text-secondary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <span>Identifiants incorrects. Veuillez réessayer.</span>
        </div>
      </div>
      
      <p class="text-center mt-auto pt-8 text-xs text-gray-400">
        &copy; 2026 Harmonie-Retrouvailles.educ
      </p>
    </div>

    <script type="module" src="/login.js"></script>
  </body>
</html>
