<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direction & Discipline | Harmonie-Retrouvailles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a192f; }
    .font-display { font-family: 'Playfair Display', serif; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .glass-light { background: rgba(255,255,255,0.07); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .sidebar-link { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,0.6);transition:all .2s;cursor:pointer; }
    .sidebar-link:hover, .sidebar-link.active { background:rgba(255,255,255,0.08);color:#fff; }
    .sidebar-link.active { border-left: 3px solid #8b5cf6; padding-left: 13px; }
    .kpi-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; transition: all .3s; }
    .kpi-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body class="text-white min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 min-h-screen glass flex flex-col py-6 px-4 flex-shrink-0 fixed left-0 top-0 bottom-0 z-40">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-2 mb-8">
      <div class="w-10 h-10 bg-[#0a192f] border-2 border-purple-500 flex items-center justify-center font-display font-bold text-base rounded-lg shadow-[0_0_15px_rgba(139,92,246,0.3)]">HR</div>
      <div>
        <p class="font-black text-sm leading-tight">Espace</p>
        <p class="text-purple-400 text-xs font-bold">Préfet & Disc.</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="space-y-1 flex-1">
      <div class="sidebar-link active" onclick="showView('accueil')"><i data-lucide="shield" class="w-5 h-5"></i> Contrôle Général</div>
      <div class="sidebar-link" onclick="showView('incidents')"><i data-lucide="alert-triangle" class="w-5 h-5"></i> Registre Incidents</div>
      <div class="sidebar-link" onclick="showView('absences')"><i data-lucide="user-minus" class="w-5 h-5"></i> Suivi Absences</div>
      <div class="sidebar-link" onclick="showView('rondes')"><i data-lucide="map" class="w-5 h-5"></i> Rapport de Rondes</div>
      <div class="sidebar-link" onclick="showView('rapports')"><i data-lucide="file-text" class="w-5 h-5"></i> Rapports Direction</div>
    </nav>

    <!-- User -->
    <div class="mt-auto">
      <div class="glass-light p-4 rounded-2xl mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-purple-500/20 border border-purple-500/30 flex items-center justify-center text-purple-400 font-black text-sm" id="prefet-avatar">MT</div>
          <div>
            <p class="font-bold text-sm" id="prefet-name">Marc Tshilanda</p>
            <p class="text-[11px] text-gray-400">Préfet de Discipline</p>
          </div>
        </div>
      </div>
      <button onclick="localStorage.clear(); window.location.href='/login.html'" class="w-full flex items-center gap-2 px-4 py-2.5 rounded-xl text-red-400 hover:bg-red-500/10 transition text-sm font-bold">
        <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="ml-64 flex-1 p-8 overflow-y-auto" id="main-content">
    <!-- Views dynamically injected -->
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem('hr_user')) || { nom: 'Tshilanda', prenom: 'Marc', role: 'Préfet' };
    document.getElementById('prefet-name').textContent = `${user.prenom} ${user.nom}`;
    document.getElementById('prefet-avatar').textContent = (user.prenom[0]||'')+(user.nom[0]||'');

    function setActiveLink(viewName) {
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      const links = document.querySelectorAll('.sidebar-link');
      const map = { accueil:0, incidents:1, absences:2, rondes:3, rapports:4 };
      if (links[map[viewName]]) links[map[viewName]].classList.add('active');
    }

    function showView(name) {
      setActiveLink(name);
      const c = document.getElementById('main-content');
      switch(name) {
        case 'accueil': c.innerHTML = viewAccueil(); break;
        case 'incidents': c.innerHTML = viewIncidents(); break;
        case 'absences': c.innerHTML = viewAbsences(); break;
        case 'rondes': c.innerHTML = viewRondes(); break;
        case 'rapports': c.innerHTML = viewRapports(); break;
      }
      if (window.lucide) lucide.createIcons();
    }

    function viewAccueil() {
      return `
        <div class="mb-8">
          <h2 class="text-3xl font-black uppercase tracking-tighter">Tableau de Bord Discipline</h2>
          <p class="text-xs text-gray-400 font-bold mt-1 uppercase tracking-widest">${new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div class="kpi-card"><div class="text-3xl font-black text-red-500 mb-1">4</div><div class="text-xs font-black text-gray-400 uppercase">Absences signalées</div></div>
          <div class="kpi-card"><div class="text-3xl font-black text-amber-500 mb-1">2</div><div class="text-xs font-black text-gray-400 uppercase">Incidents ouverts</div></div>
          <div class="kpi-card"><div class="text-3xl font-black text-purple-500 mb-1">3</div><div class="text-xs font-black text-gray-400 uppercase">Rondes effectuées</div></div>
          <div class="kpi-card"><div class="text-3xl font-black text-green-500 mb-1">100%</div><div class="text-xs font-black text-gray-400 uppercase">Rapports à jour</div></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="glass p-6 rounded-2xl">
            <h3 class="font-black text-base uppercase tracking-wider mb-4 text-purple-400">Actions Urgentes</h3>
            <div class="space-y-3">
              <div class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl flex justify-between items-center">
                <div><p class="font-bold text-sm text-red-400">Justifier l'absence de KABONGO M.</p><p class="text-xs text-gray-400">1ère Humanités</p></div>
                <button class="px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-black">Traiter</button>
              </div>
              <div class="p-3 bg-amber-500/10 border border-amber-500/20 rounded-xl flex justify-between items-center">
                <div><p class="font-bold text-sm text-amber-400">Bagarre signalée (Cour A)</p><p class="text-xs text-gray-400">Rapport en attente</p></div>
                <button class="px-3 py-1.5 bg-amber-500 text-[#0a192f] rounded-lg text-xs font-black">Traiter</button>
              </div>
            </div>
          </div>
          <div class="glass p-6 rounded-2xl">
            <h3 class="font-black text-base uppercase tracking-wider mb-4 text-purple-400">Transmission Rapide (Direction)</h3>
            <textarea rows="3" placeholder="Tapez un flash info à la Direction..." class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-purple-500 resize-none mb-3"></textarea>
            <button onclick="alert('Message envoyé à la Direction Générale !')" class="w-full py-3 bg-purple-600 text-white font-black rounded-xl hover:bg-purple-500 transition shadow-[0_0_15px_rgba(147,51,234,0.3)]">
              Envoyer Alerte
            </button>
          </div>
        </div>`;
    }

    function viewIncidents() {
      return `
        <div class="mb-8 flex justify-between items-end">
          <div><h2 class="text-3xl font-black uppercase tracking-tighter">Registre des Incidents</h2><p class="text-xs text-gray-400 font-bold mt-1 uppercase tracking-widest">Suivi disciplinaire</p></div>
          <button class="px-6 py-3 bg-purple-600 text-white font-black rounded-xl flex items-center gap-2"><i data-lucide="plus"></i> Nouvel Incident</button>
        </div>
        <div class="glass p-6 rounded-2xl">
          <table class="w-full text-left">
            <thead class="text-[10px] text-gray-400 uppercase tracking-widest border-b border-white/10">
              <tr><th class="pb-4">Date</th><th class="pb-4">Élève(s) impliqué(s)</th><th class="pb-4">Motif</th><th class="pb-4">Sanction</th><th class="pb-4">Statut</th></tr>
            </thead>
            <tbody class="divide-y divide-white/5 text-sm">
              <tr>
                <td class="py-4">13/07 - 10:15</td><td class="py-4 font-bold">NKASHAMA & MUTOMBO</td><td class="py-4 text-gray-400">Altercation physique</td>
                <td class="py-4"><span class="px-2 py-1 bg-red-500/20 text-red-400 rounded text-xs">Exclusion 3 jours</span></td>
                <td class="py-4"><span class="text-amber-500 font-bold text-xs uppercase">En cours</span></td>
              </tr>
              <tr>
                <td class="py-4">12/07 - 14:00</td><td class="py-4 font-bold">TSHILANDA Alice</td><td class="py-4 text-gray-400">Téléphone en classe</td>
                <td class="py-4"><span class="px-2 py-1 bg-amber-500/20 text-amber-400 rounded text-xs">Confiscation</span></td>
                <td class="py-4"><span class="text-green-500 font-bold text-xs uppercase">Clos</span></td>
              </tr>
            </tbody>
          </table>
        </div>`;
    }

    function viewAbsences() {
        return `
        <div class="mb-8">
          <h2 class="text-3xl font-black uppercase tracking-tighter">Suivi des Absences</h2>
          <p class="text-xs text-gray-400 font-bold mt-1 uppercase tracking-widest">Contrôle des billets de justification</p>
        </div>
        <div class="glass p-6 rounded-2xl text-center py-20 text-gray-400">
            <i data-lucide="file-check-2" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
            <p class="font-bold">Module en cours de synchronisation avec les données Enseignants.</p>
        </div>`;
    }
    function viewRondes() {
        return `
        <div class="mb-8">
          <h2 class="text-3xl font-black uppercase tracking-tighter">Rapports de Rondes</h2>
          <p class="text-xs text-gray-400 font-bold mt-1 uppercase tracking-widest">Inspection des bâtiments et cours</p>
        </div>
        <div class="glass p-6 rounded-2xl text-center py-20 text-gray-400">
            <i data-lucide="map" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
            <p class="font-bold">Aucune ronde enregistrée aujourd'hui.</p>
        </div>`;
    }
    function viewRapports() {
        return `
        <div class="mb-8">
          <h2 class="text-3xl font-black uppercase tracking-tighter">Rapports Direction</h2>
          <p class="text-xs text-gray-400 font-bold mt-1 uppercase tracking-widest">Soumission officielle</p>
        </div>
        <div class="glass p-6 rounded-2xl max-w-2xl">
            <h3 class="font-black mb-4 uppercase text-sm">Rapport Journalier</h3>
            <textarea rows="6" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white mb-4 outline-none focus:ring-2 focus:ring-purple-500" placeholder="Rédigez le résumé de la journée..."></textarea>
            <button class="px-6 py-3 bg-purple-600 font-black rounded-xl shadow-[0_0_15px_rgba(147,51,234,0.3)]">Soumettre à la Direction</button>
        </div>`;
    }

    // Init
    showView('accueil');
  </script>
</body>
</html>
